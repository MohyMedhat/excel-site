<!DOCTYPE html>
<html lang="ar" direction="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الأصول الذكية المزدوجة | LIVE DASHBOARD</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-main: #060814;
        --card-bg: rgba(13, 20, 38, 0.45);
        --border-color: rgba(255, 255, 255, 0.06);
        --text-primary: #f8fafc;
        --text-secondary: #64748b;
        
        --egypt-color: #ff4a4a;
        --egypt-glow: rgba(255, 74, 74, 0.2);
        --usa-color: #3b82f6;
        --usa-glow: rgba(59, 130, 246, 0.2);
        --qatar-color: #a855f7;
        --qatar-glow: rgba(168, 85, 247, 0.2);
        --gold-color: #f59e0b;
        --gold-glow: rgba(245, 158, 11, 0.3);
        --summary-glow: rgba(56, 189, 248, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--bg-main);
        background-image: 
            radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
            radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 40%);
        color: var(--text-primary);
        direction: rtl;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 5%;
        background: rgba(6, 8, 20, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .brand { display: flex; align-items: center; gap: 14px; }

    .brand h1 {
        font-size: 22px;
        font-weight: 900;
        background: linear-gradient(135deg, #38bdf8 0%, #c084fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .live-status {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: 700;
        color: #10b981;
    }

    .live-dot {
        width: 8px;
        height: 8px;
        background-color: #10b981;
        border-radius: 50%;
        animation: pulse 1.5s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }

    .refresh-btn {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        padding: 10px 20px;
        font-family: 'Cairo', sans-serif;
        font-size: 13px;
        font-weight: 700;
        border-radius: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
    }

    .refresh-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
    .refresh-btn.spinning svg { animation: spin 1s linear infinite; }

    .container { max-width: 1300px; margin: 40px auto; padding: 0 24px; }
    
    .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
    }

    .summary-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 20px
