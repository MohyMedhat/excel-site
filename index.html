<!DOCTYPE html>
<html lang="ar" direction="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الأصول الذكية المزدوجة | LIVE DASHBOARD</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-main: #060814;
        --card-bg: rgba(13, 20, 38, 0.45);
        --border-color: rgba(255, 255, 255, 0.06);
        --text-primary: #f8fafc;
        --text-secondary: #64748b;
        --egypt-color: #ff4a4a;
        --egypt-glow: rgba(255, 74, 74, 0.2);
        --usa-color: #3b82f6;
        --usa-glow: rgba(59, 130, 246, 0.2);
        --qatar-color: #a855f7;
        --qatar-glow: rgba(168, 85, 247, 0.2);
        --gold-color: #f59e0b;
        --gold-glow: rgba(245, 158, 11, 0.3);
        --summary-glow: rgba(56, 189, 248, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--bg-main);
        color: var(--text-primary);
        direction: rtl;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* كود تثبيت الأرقام لمنع الاهتزاز بين الموبايل والـ PC */
    .numeric-value, .cash-amount, .summary-value {
        font-family: 'Cairo', sans-serif !important;
        font-variant-numeric: tabular-nums !important;
        font-feature-settings: "tnum" 1 !important;
        -webkit-font-smoothing: antialiased;
        white-space: nowrap !important;
        display: inline-block;
    }

    .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(6, 8, 20, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
    .brand h1 { font-size: 22px; font-weight: 900; background: linear-gradient(135deg, #38bdf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .refresh-btn { background: rgba(255, 255, 255, 0.03); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px 20px; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700; border-radius: 14px; cursor: pointer; transition: all 0.3s ease; }
    .refresh-btn.spinning svg { animation: spin 1s linear infinite; }

    .container { max-width: 1300px; margin: 40px auto; padding: 0 24px; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .summary-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
    
    .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
    .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 28px; padding: 35px 25px; transition: all 0.4s ease; }
    
    .numeric-value { font-size: 38px; font-weight: 900; margin-top: 10px; }
    .cash-sub-box { margin-top: 15px; padding-top: 12px; border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; font-size: 13px; }
    .value-update { opacity: 0.4; }
    
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
    <div class="brand"><h1>لوحة المراقبة والتحليل المالي الذكي</h1></div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">تحديث فوري</button>
</div>

<div class="container">
    <div class="summary-grid">
        <div class="summary-card"><div class="summary-label">إجمالي المحفظة ج.م</div><div class="summary-value" id="grand_total_egp">--</div></div>
        <div class="summary-card"><div class="summary-label">إجمالي المحفظة دولار</div><div class="summary-value" id="grand_total_usd">--</div></div>
        <div class="summary-card"><div class="summary-label">إجمالي المحفظة ريال</div><div class="summary-value" id="grand_total_qar">--</div></div>
    </div>
    
    <div class="grid-cards">
        <div class="card"><div class="country-title">الرصيد بالجنيه المصري</div><div class="numeric-value" id="total_egypt">--</div><div class="cash-sub-box"><span>كاش مصري:</span><span class="cash-amount" id="cash_egypt">--</span></div></div>
        <div class="card"><div class="country-title">الرصيد بالدولار الأمريكي</div><div class="numeric-value" id="total_usa">--</div><div class="cash-sub-box"><span>الرصيد (ج.م):</span><span class="cash-amount" id="cash_usa">--</span></div></div>
        <div class="card"><div class="country-title">الرصيد بالريال القطري</div><div class="numeric-value" id="total_qatar">--</div><div class="cash-sub-box"><span>الرصيد (ج.م):</span><span class="cash-amount" id="cash_qatar">--</span></div></div>
        <div class="card"><div class="country-title">جرامات الذهب</div><div class="numeric-value" id="total_gold_grams">--</div><div class="cash-sub-box"><span>إجمالي القيمة:</span><span class="cash-amount" id="total_gold_value">--</span></div></div>
    </div>
</div>

<script>
const baseApiUrl = "https://script.google.com/macros/s/AKfycbzByqVbXYsBxCR8AL_kjGHC8MbGJkUPZCrqbUaf54F3B11ni6S9TmZPpg0s-J7RDC1oLg/exec";

function smoothUpdate(id, val, isDec = false) {
    const el = document.getElementById(id);
    if (!el) return;
    let num = Number(val);
    let formatted = isDec ? num.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : Math.round(num).toLocaleString('en-US');
    if (el.textContent !== formatted) {
        el.classList.add('value-update');
        setTimeout(() => { el.textContent = formatted; el.classList.remove('value-update'); }, 200);
    }
}

async function loadData() {
    try {
        // إضافة الوقت الحالي للرابط لمنع الكاش نهائياً
        const response = await fetch(`${baseApiUrl}?_=${new Date().getTime()}`);
        const matrix = await response.json();
        matrix.forEach(row => {
            if (row.length < 2) return;
            let key = String(row[0]).replace(/\s+/g, '').toLowerCase();
            let val = Number(row[1]);
            if (isNaN(val)) return;
            
            if (key === "اجماليمصر") smoothUpdate('total_egypt', val);
            else if (key === "اجماليدولار") smoothUpdate('total_usa', val);
            else if (key === "اجماليريال") smoothUpdate('total_qatar', val);
            else if (key === "مصر") smoothUpdate('cash_egypt', val);
            else if (key === "دولار") smoothUpdate('cash_usa', val);
            else if (key === "ريال") smoothUpdate('cash_qatar', val);
            else if (key === "جراماتذهب") smoothUpdate('total_gold_grams', val, true);
            else if (key === "ذهب") smoothUpdate('total_gold_value', val);
            else if (key === "كليةمصر") smoothUpdate('grand_total_egp', val);
            else if (key === "كليةدولار") smoothUpdate('grand_total_usd', val);
            else if (key === "كليةريال") smoothUpdate('grand_total_qar', val);
        });
    } catch (e) { console.error("Error:", e); }
}

function manualRefresh() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    loadData().then(() => setTimeout(() => btn.classList.remove('spinning'), 600));
}

setInterval(loadData, 2000);
loadData();
</script>
</body>
</html>
