<!DOCTYPE html>
<html lang="ar" direction="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المؤشرات الحية  | REAL-TIME DASHBOARD</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-main: #060814;
        --card-bg: rgba(13, 20, 38, 0.45);
        --border-color: rgba(255, 255, 255, 0.06);
        --text-primary: #f8fafc;
        --text-secondary: #64748b;
        
        /* تأثيرات الإضاءة الخاصة بالدول */
        --egypt-color: #ff4a4a;
        --egypt-glow: rgba(255, 74, 74, 0.25);
        --usa-color: #3b82f6;
        --usa-glow: rgba(59, 130, 246, 0.25);
        --qatar-color: #a855f7;
        --qatar-glow: rgba(168, 85, 247, 0.25);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--bg-main);
        background-image: 
            radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
            radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 40%);
        color: var(--text-primary);
        direction: rtl;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* الشريط العلوي الهيدر */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 5%;
        background: rgba(6, 8, 20, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .brand h1 {
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #38bdf8 0%, #c084fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .live-status {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: 700;
        color: #10b981;
        letter-spacing: 0.2px;
    }

    .live-dot {
        width: 8px;
        height: 8px;
        background-color: #10b981;
        border-radius: 50%;
        animation: pulse 1.5s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }

    /* زر التحديث الاحترافي */
    .refresh-btn {
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        padding: 10px 20px;
        font-family: 'Cairo', sans-serif;
        font-size: 13px;
        font-weight: 700;
        border-radius: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .refresh-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
    }

    .refresh-btn svg {
        transition: transform 0.5s ease;
    }

    .refresh-btn.spinning svg {
        animation: spin 1s linear infinite;
    }

    /* الحاوية الأساسية للكروت */
    .container {
        max-width: 1300px;
        margin: 60px auto;
        padding: 0 24px;
    }

    .grid-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 35px;
    }

    /* التصميم الزجاجي للكارت الكبير */
    .card {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border-color);
        border-radius: 32px;
        padding: 40px 30px;
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* تأثيرات التمرير الفاخرة لكل دولة */
    .card-egypt:hover { border-color: var(--egypt-color); box-shadow: 0 25px 50px -12px var(--egypt-glow); transform: translateY(-8px); }
    .card-usa:hover { border-color: var(--usa-color); box-shadow: 0 25px 50px -12px var(--usa-glow); transform: translateY(-8px); }
    .card-qatar:hover { border-color: var(--qatar-color); box-shadow: 0 25px 50px -12px var(--qatar-glow); transform: translateY(-8px); }

    /* البادج الصغير العلوي داخل الكارت */
    .currency-badge {
        position: absolute;
        top: 25px;
        left: 25px;
        font-size: 11px;
        font-weight: 800;
        padding: 4px 14px;
        border-radius: 30px;
        letter-spacing: 0.5px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .card-egypt .currency-badge { color: var(--egypt-color); background: rgba(255, 74, 74, 0.05); }
    .card-usa .currency-badge { color: var(--usa-color); background: rgba(59, 130, 246, 0.05); }
    .card-qatar .currency-badge { color: var(--qatar-color); background: rgba(168, 85, 247, 0.05); }

    /* الهيكل الداخلي لمحتوى الكارت */
    .card-content {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .flag-wrapper {
        width: 85px;
        height: 85px;
        border-radius: 50%;
        overflow: hidden;
        margin-bottom: 20px;
        border: 2px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        transition: transform 0.4s ease;
    }
    .card:hover .flag-wrapper {
        transform: scale(1.08);
    }
    .flag-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .country-title {
        font-size: 17px;
        font-weight: 700;
        color: var(--text-secondary);
        margin-bottom: 8px;
    }

    /* تنسيق وعرض الأرقام الضخمة */
    .numeric-value {
        font-size: 52px;
        font-weight: 900;
        color: #ffffff;
        font-family: 'Cairo', sans-serif;
        letter-spacing: -1px;
        line-height: 1.2;
        margin-top: 10px;
        transition: text-shadow 0.3s ease, transform 0.2s ease, opacity 0.2s ease;
    }
    
    /* توهج النيون للأرقام */
    .card-egypt .numeric-value { text-shadow: 0 0 30px rgba(255, 74, 74, 0.4); }
    .card-usa .numeric-value { text-shadow: 0 0 30px rgba(59, 130, 246, 0.4); }
    .card-qatar .numeric-value { text-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }

    /* أنيميشن وميض التحديث الذكي للأرقام */
    .value-update {
        opacity: 0.5;
        transform: scale(0.98);
    }

    @keyframes pulse {
        0% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        100% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
        .header { padding: 15px 20px; flex-direction: column; gap: 15px; align-items: stretch; text-align: center; }
        .brand { flex-direction: column; gap: 8px; }
        .grid-cards { grid-template-columns: 1fr; gap: 25px; }
        .container { margin: 30px auto; }
        .refresh-btn { justify-content: center; }
    }
</style>
</head>
<body>

<div class="header">
    <div class="brand">
        <div class="live-status">
            <span class="live-dot"></span>
            <span>بث مباشر ذكي</span>
        </div>
        <h1>المراقبة الذكية الموحدة</h1>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
        <span>تحديث فوري</span>
    </button>
</div>

<div class="container">
    <div class="grid-cards">
        
        <!-- كارت مصر -->
        <div class="card card-egypt">
            <span class="currency-badge">EGP / ج.م</span>
            <div class="card-content">
                <div class="flag-wrapper">
                    <img src="https://flagcdn.com/w160/eg.png" alt="مصر">
                </div>
                <div class="country-title">جمهورية مصر العربية</div>
                <div class="numeric-value" id="egypt">--</div>
            </div>
        </div>
        
        <!-- كارت أمريكا -->
        <div class="card card-usa">
            <span class="currency-badge">USD / $</span>
            <div class="card-content">
                <div class="flag-wrapper">
                    <img src="https://flagcdn.com/w160/us.png" alt="أمريكا">
                </div>
                <div class="country-title">الولايات المتحدة الأمريكية</div>
                <div class="numeric-value" id="usa">--</div>
            </div>
        </div>
        
        <!-- كارت قطر -->
        <div class="card card-qatar">
            <span class="currency-badge">QAR / ر.ق</span>
            <div class="card-content">
                <div class="flag-wrapper">
                    <img src="https://flagcdn.com/w160/qa.png" alt="قطر">
                </div>
                <div class="country-title">دولة قطر</div>
                <div class="numeric-value" id="qatar">--</div>
            </div>
        </div>

    </div>
</div>

<script>
// ضع رابط الـ Web App الخاص بـ Google Script هنا
const apiUrl = "https://script.google.com/macros/s/AKfycbzByqVbXYsBxCR8AL_kjGHC8MbGJkUPZCrqbUaf54F3B11ni6S9TmZPpg0s-J7RDC1oLg/exec";

let isFetching = false;

async function loadData() {
    if (isFetching) return; 
    isFetching = true;
    
    try {
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error("Network issues encountered");
        
        const matrix = await response.json(); 

        for (let r = 0; r < matrix.length; r++) {
            if (!matrix[r] || matrix[r].length < 2) continue;
            
            let cellText = String(matrix[r][0]).trim().toLowerCase();
            let num = Number(matrix[r][1]);
            
            if (isNaN(num)) continue;

            let countryId = "";
            if (cellText.includes("مصر") || cellText.includes("egy")) countryId = "egypt";
            else if (cellText.includes("أمريكا") || cellText.includes("امريكا") || cellText.includes("usa")) countryId = "usa";
            else if (cellText.includes("قطر") || cellText.includes("qatar")) countryId = "qatar";

            if (countryId !== "") {
                const element = document.getElementById(countryId);
                const newValue = num.toLocaleString('en-US');
                
                // تأثير بصري وميضي ذكي فقط في حال تغير القيمة الفعلي لمنع الإزعاج البصري
                if (element.textContent !== newValue) {
                    element.classList.add('value-update');
                    setTimeout(() => {
                        element.textContent = newValue;
                        element.classList.remove('value-update');
                    }, 200);
                }
            }
        }
    } catch (err) {
        console.error("Error drawing live dashboard parameters:", err);
    } finally {
        isFetching = false;
    }
}

// دالة التحديث اليدوي عند الضغط على الزر مع أنيميشن دوران الأيقونة
async function manualRefresh() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    await loadData();
    setTimeout(() => {
        btn.classList.remove('spinning');
    }, 600);
}

// التشغيل الفوري والدوري الصامت المباشر كل ثانيتين
document.addEventListener("DOMContentLoaded", () => {
    loadData();
    setInterval(loadData, 2000); 
});
</script>
</body>
</html>
