<!DOCTYPE html>
<html lang="ar" direction="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الأصول الذكية المزدوجة | LIVE DASHBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-main: #060814;
        --card-bg: rgba(13, 20, 38, 0.45);
        --border-color: rgba(255, 255, 255, 0.06);
        --text-primary: #f8fafc;
        --text-secondary: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background-color: var(--bg-main); color: var(--text-primary); direction: rtl; min-height: 100vh; }
    
    /* هذا التعديل يضمن ثبات الأرقام ومنع التزحزح على الموبايل والـ PC */
    .numeric-value, .cash-amount, .summary-value {
        font-family: 'Cairo', sans-serif !important;
        font-variant-numeric: tabular-nums !important;
        font-feature-settings: "tnum" 1 !important;
        white-space: nowrap !important;
        display: inline-block;
    }

    .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(6, 8, 20, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
    .container { max-width: 1300px; margin: 40px auto; padding: 0 24px; }
    .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
    .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 28px; padding: 35px 25px; }
    .flag-wrapper { width: 85px; height: 85px; border-radius: 50%; overflow: hidden; margin: 0 auto 20px; border: 2px solid rgba(255, 255, 255, 0.08); }
    .flag-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .numeric-value { font-size: 38px; font-weight: 900; color: #ffffff; margin-top: 10px; }
    .cash-sub-box { margin-top: 15px; padding-top: 12px; border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; font-size: 13px; }
    .value-update { opacity: 0.4; }
</style>
</head>
<body>

<div class="header"><h1>لوحة المراقبة والتحليل المالي الذكي</h1></div>
<div class="container">
    <div class="grid-cards">
        <div class="card">
            <div class="flag-wrapper"><img src="https://flagcdn.com/w160/eg.png" alt="مصر"></div>
            <div class="country-title">الرصيد بالجنيه المصري</div>
            <div class="numeric-value" id="total_egypt">--</div>
            <div class="cash-sub-box"><span>كاش مصري:</span><span class="cash-amount" id="cash_egypt">--</span></div>
        </div>
        </div>
</div>

<script>
const baseApiUrl = "https://script.google.com/macros/s/AKfycbzByqVbXYsBxCR8AL_kjGHC8MbGJkUPZCrqbUaf54F3B11ni6S9TmZPpg0s-J7RDC1oLg/exec";

function smoothUpdate(id, val, isDec = false) {
    const el = document.getElementById(id);
    if (!el) return;
    let num = Number(val);
    let formatted = isDec ? num.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : Math.round(num).toLocaleString('en-US');
    if (el.textContent !== formatted) {
        el.classList.add('value-update');
        setTimeout(() => { el.textContent = formatted; el.classList.remove('value-update'); }, 200);
    }
}

async function loadData() {
    try {
        const response = await fetch(`${baseApiUrl}?_=${new Date().getTime()}`);
        const matrix = await response.json();
        matrix.forEach(row => {
            if (row.length < 2) return;
            let key = String(row[0]).replace(/\s+/g, '').toLowerCase();
            let val = row[1];
            
            // تحديث القيم
            if (key === "اجماليمصر") smoothUpdate('total_egypt', val);
            else if (key === "مصر") smoothUpdate('cash_egypt', val);
            // ... (أكمل باقي الربط لباقي الخانات بنفس الطريقة)
        });
    } catch (e) { console.error("Error:", e); }
}
setInterval(loadData, 2000);
loadData();
</script>
</body>
</html>
